<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ACE ICPC | CF GRIND — Settings</title>
  <link rel="stylesheet" href="./settings.css" />
</head>
<body class="theme-dark">
  <div class="settings-wrap">
    <h1>⚙️ Settings</h1>

    <section class="card">
      <h2>Codeforces Handle</h2>
      <input id="handle" type="text" placeholder="e.g. tourist" />
    </section>

    <section class="card">
      <h2>Theme</h2>
      <select id="theme">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </section>

    <section class="card">
      <h2>AI Hint Provider</h2>
      <select id="provider">
        <option value="gemini">Gemini</option>
        <option value="openai">OpenAI</option>
      </select>
      <label for="apikey">API Key</label>
      <input id="apikey" type="password" placeholder="Paste your API key" />
      <p class="hint-text">Your key is stored locally in chrome.storage and never leaves your browser except to call the chosen provider's API directly.</p>
    </section>

    <section class="card">
      <h2>Cache Controls</h2>
      <label for="ttl">Cache TTL (minutes)</label>
      <input id="ttl" type="number" min="5" max="1440" />
      <button id="clear-cache" class="secondary-btn">Clear Cached Data</button>
    </section>

    <section class="card">
      <h2>Data Export</h2>
      <button id="export-data" class="secondary-btn">Export All Data as JSON</button>
    </section>

    <button id="save" class="primary-btn">Save Settings</button>
    <div id="status" class="status-text"></div>
  </div>
  <script type="module" src="./settings.ts"></script>
</body>
</html>
